<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Reset your account password">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="https://ink-backend-zaeq.onrender.com/api/images/optimize?url=site/IC.png&format=png&w=64">
    <link rel="apple-touch-icon" href="https://ink-backend-zaeq.onrender.com/api/images/optimize?url=site/IC.png&format=png&w=180">
    <title>Reset Password | InkCartridges.co.nz</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SDQELG0FGD"></script>
    <script src="/js/gtag.js"></script>

    <link rel="preconnect" href="https://ink-backend-zaeq.onrender.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/modern-effects.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header site-header--minimal">
        <div class="header-main">
            <div class="container">
                <a href="/" class="logo" aria-label="InkCartridges.co.nz Home">
                    <span class="logo__text">Ink<span>Cartridges</span>.co.nz</span>
                </a>
                <a href="/" class="header-back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M19 12H5"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Store
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="site-main">
        <section class="auth-page">
            <div class="container container--narrow">
                <div class="auth-form-wrapper" id="forgot-password-wrapper">
                    <h1 class="auth-form__heading">Reset Your Password</h1>
                    <p class="auth-form__subheading">Enter your email address and we'll send you a link to reset your password.</p>

                    <form class="auth-form" id="forgot-password-form" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                            <span id="email-error" class="form-error" hidden></span>
                        </div>

                        <button type="submit" class="btn btn--primary btn--large btn--full-width">
                            Send Reset Link
                        </button>
                    </form>

                    <p class="auth-form__switch">
                        Remember your password? <a href="/html/account/login.html">Sign in</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer"></footer>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0" integrity="sha384-Sm2s7OXxsAMTyJ4iIyRBgVpeGUvMPk2lRQnnZhE78Wej7oggIoolKt+SCt0XJbUB" crossorigin="anonymous"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/security.js"></script>
    <script defer src="/js/utils.js"></script>
    <script defer src="/js/api.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/modern-effects.js"></script>
    <script defer src="/js/forgot-password-page.js"></script>
    <script defer src="/js/analytics.js"></script>
    <script defer src="/js/footer.js"></script>
</body>
</html>
