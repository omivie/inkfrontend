<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header site-header--minimal">
        <div class="header-main">
            <div class="container">
                <a href="/" class="logo" aria-label="InkCartridges.co.nz Home">
                    <span class="logo__text">Ink<span>Cartridges</span>.co.nz</span>
                </a>
                <a href="/" class="header-back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M19 12H5"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Store
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="site-main">
        <section class="auth-page">
            <div class="container container--narrow">
                <div class="auth-form-wrapper" id="forgot-password-wrapper">
                    <h1 class="auth-form__heading">Reset Your Password</h1>
                    <p class="auth-form__subheading">Enter your email address and we'll send you a link to reset your password.</p>

                    <form class="auth-form" id="forgot-password-form" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                            <span id="email-error" class="form-error" hidden></span>
                        </div>

                        <button type="submit" class="btn btn--primary btn--large btn--full-width">
                            Send Reset Link
                        </button>
                    </form>

                    <p class="auth-form__switch">
                        Remember your password? <a href="/account/login">Sign in</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer"><noscript><p>InkCartridges.co.nz &mdash; Phone: <a href="tel:0274740115">027 474 0115</a> &mdash; Email: inkandtoner@windowslive.com &mdash; 37A Archibald Road, Kelston, Auckland 0602, NZ</p></noscript></footer>

    <script defer src="/js/forgot-password-page.js?v=d24cef14"></script>
    <script defer src="/js/analytics.js?v=8c9ee196"></script>
    <script defer src="/js/footer.js?v=8eae528e"></script>
    <script defer src="/js/site-guard.js?v=2e596146"></script>
</body>
