<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header site-header--minimal site-header--centered">
        <div class="header-main">
            <div class="container">
                <a href="/" class="logo" aria-label="InkCartridges.co.nz Home">
                    <span class="logo__text">Ink<span>Cartridges</span>.co.nz</span>
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="site-main">
        <section class="verify-email-page">
            <div class="container container--narrow">
                <div class="verify-email-card">
                    <div class="verify-email-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                    </div>

                    <h1 class="verify-email-heading">Check Your Email</h1>

                    <p class="verify-email-text">
                        We've sent a verification link to your email address.
                        Please check your inbox and click the link to verify your account.
                    </p>

                    <div class="verify-email-note">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                        <span>Don't forget to check your spam folder if you don't see the email.</span>
                    </div>

                    <div class="verify-email-actions">
                        <button id="resend-btn" class="btn btn--primary btn--large" style="display:none;">
                            Resend Verification Email
                        </button>
                        <a href="/account/login" class="btn btn--secondary btn--large">
                            Go to Sign In
                        </a>
                        <a href="/" class="btn btn--secondary btn--large">
                            Back to Home
                        </a>
                    </div>
                    <p id="resend-status" class="verify-email-note" style="display:none;"></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer"><noscript><p>InkCartridges.co.nz is operated by Office Consumables Ltd (NZBN 9429033934204, GST 94-509-459). Phone <a href="tel:0274740115">027 474 0115</a> &mdash; Email <a href="mailto:support@inkcartridges.co.nz">support@inkcartridges.co.nz</a> &mdash; 37A Archibald Road, Kelston, Auckland 0602, New Zealand.</p></noscript></footer>
