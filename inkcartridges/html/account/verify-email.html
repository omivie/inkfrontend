<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Verify your email address to complete registration">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <title>Verify Your Email | InkCartridges.co.nz</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SDQELG0FGD"></script>
    <script src="/js/gtag.js"></script>

    <link rel="preconnect" href="https://ink-backend-zaeq.onrender.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/modern-effects.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header site-header--minimal site-header--centered">
        <div class="header-main">
            <div class="container">
                <a href="/" class="logo" aria-label="InkCartridges.co.nz Home">
                    <span class="logo__text">InkCartridges<span class="logo__domain">.co.nz</span></span>
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="site-main">
        <section class="verify-email-page">
            <div class="container container--narrow">
                <div class="verify-email-card">
                    <div class="verify-email-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                    </div>

                    <h1 class="verify-email-heading">Check Your Email</h1>

                    <p class="verify-email-text">
                        We've sent a verification link to your email address.
                        Please check your inbox and click the link to verify your account.
                    </p>

                    <div class="verify-email-note">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                        <span>Don't forget to check your spam folder if you don't see the email.</span>
                    </div>

                    <div class="verify-email-actions">
                        <button id="resend-btn" class="btn btn--primary btn--large" style="display:none;">
                            Resend Verification Email
                        </button>
                        <a href="/html/account/login.html" class="btn btn--secondary btn--large">
                            Go to Sign In
                        </a>
                        <a href="/" class="btn btn--secondary btn--large">
                            Back to Home
                        </a>
                    </div>
                    <p id="resend-status" class="verify-email-note" style="display:none;"></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer"></footer>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0" integrity="sha384-Sm2s7OXxsAMTyJ4iIyRBgVpeGUvMPk2lRQnnZhE78Wej7oggIoolKt+SCt0XJbUB" crossorigin="anonymous"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/api.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/verify-email-page.js"></script>
    <script defer src="/js/modern-effects.js"></script>
    <script defer src="/js/analytics.js"></script>
    <script defer src="/js/footer.js"></script>
</body>
</html>
