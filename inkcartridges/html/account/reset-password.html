<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Set your new password">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Set New Password | InkCartridges.co.nz</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SDQELG0FGD"></script>
    <script src="/js/gtag.js"></script>

    <link rel="preconnect" href="https://ink-backend-zaeq.onrender.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css?v=20260416a">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/modern-effects.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header site-header--minimal site-header--centered">
        <div class="header-main">
            <div class="container">
                <a href="/" class="logo" aria-label="InkCartridges.co.nz Home">
                    <span class="logo__text">Ink<span>Cartridges</span>.co.nz</span>
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="site-main">
        <section class="auth-page">
            <div class="container container--narrow">
                <div class="auth-form-wrapper">
                    <h1 class="auth-form__heading">Set New Password</h1>
                    <p class="auth-form__subheading">Enter your new password below.</p>

                    <form class="auth-form" id="reset-password-form" novalidate>
                        <div class="form-group">
                            <label for="new-password" class="form-label">New Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="new-password" name="password" class="form-input" required autocomplete="new-password" minlength="8">
                                <button type="button" class="password-toggle" aria-label="Show password">
                                    <svg class="password-toggle__show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                    <svg class="password-toggle__hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                        <line x1="1" y1="1" x2="23" y2="23"/>
                                    </svg>
                                </button>
                            </div>
                            <span class="form-hint">At least 8 characters</span>
                        </div>

                        <div class="form-group">
                            <label for="confirm-password" class="form-label">Confirm New Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="confirm-password" name="confirmPassword" class="form-input" required autocomplete="new-password">
                                <button type="button" class="password-toggle" aria-label="Show password">
                                    <svg class="password-toggle__show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                    <svg class="password-toggle__hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                        <line x1="1" y1="1" x2="23" y2="23"/>
                                    </svg>
                                </button>
                            </div>
                            <span id="password-error" class="form-error" hidden>Passwords do not match.</span>
                        </div>

                        <button type="submit" class="btn btn--primary btn--large btn--full-width">
                            Update Password
                        </button>
                    </form>

                    <p class="auth-form__switch">
                        <a href="/html/account/login.html">Back to Sign In</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer"><noscript><ul><li><a href="/html/privacy">Privacy Policy</a></li><li><a href="/html/terms">Terms &amp; Conditions</a></li><li><a href="/html/returns">Returns &amp; Refunds</a></li><li><a href="/html/shipping">Shipping Information</a></li><li><a href="/html/warranty">Warranty</a></li><li><a href="/html/payment-info">Payment Information</a></li></ul></noscript></footer>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0" integrity="sha384-Sm2s7OXxsAMTyJ4iIyRBgVpeGUvMPk2lRQnnZhE78Wej7oggIoolKt+SCt0XJbUB" crossorigin="anonymous"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/reset-password-page.js"></script>
    <script defer src="/js/modern-effects.js"></script>
    <script defer src="/js/analytics.js"></script>
    <script defer src="/js/footer.js"></script>
</body>
</html>
